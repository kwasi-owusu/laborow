<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nearby Rentals</title>
  <link rel="stylesheet" href="https://naana.threnz.com/apps/template/maps/map.css" />
  <script src="https://naana.threnz.com/apps/template/maps/map.js"></script>
  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([5.6037, -0.1870], 13); // Accra center
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    fetch("https://naana.threnz.com/api/listing/all?page=1&limit=10&?lat=5.6037&lng=-0.1870")
      .then(res => res.json())
      .then(data => {
        data.data.forEach(asset => {
          L.marker([asset.latitude, asset.longitude])
            .addTo(map)
            .bindPopup(`<b>${asset.name}</b><br>${asset.distance_km.toFixed(2)} km`);
        });
      });
  </script>
</body>
</html>
